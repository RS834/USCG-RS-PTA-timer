<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USCG Rescue Swimmer PTA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #2a2f38;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd700;
    --text: #e8edf5;
    --muted: #5a6475;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }
  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .pool-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px;
  }
  .pool-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px 14px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .pool-btn.active {
    background: var(--accent);
    color: #000;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tab {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 14px 24px;
    cursor: pointer;
    color: #353c4a;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tabs .tab:hover { color: var(--muted); }
  .pool-btn:not(.active) { color: var(--muted) !important; }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 20px 90px 20px;
  }

  /* EVENT LIST */
  .event-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .event-card:hover { border-color: var(--accent); background: var(--surface2); }
  .event-card.active { border-left-color: var(--accent); background: var(--surface2); }
  .event-card.passed { border-left-color: var(--green); }
  .event-card.failed { border-left-color: var(--red); }

  .event-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--muted);
    min-width: 32px;
  }
  .event-info { flex: 1; }
  .event-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .event-spec {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .event-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 3px;
    font-weight: 700;
  }
  .badge-metronome { background: rgba(0,212,255,0.15); color: var(--accent); }
  .badge-timer { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .badge-interval { background: rgba(255,215,0,0.15); color: var(--yellow); }
  .badge-pass { background: rgba(0,255,136,0.15); color: var(--green); }
  .badge-fail { background: rgba(255,51,85,0.15); color: var(--red); }

  /* ACTIVE EVENT PANEL */
  .event-panel {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 24px;
    margin-bottom: 12px;
    box-shadow: 0 0 30px rgba(0,212,255,0.08);
  }
  .panel-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .panel-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--accent);
    line-height: 1;
    opacity: 0.4;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
  }
  .panel-objective {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  /* BIG CLOCK */
  .clock-area {
    text-align: center;
    margin: 20px 0;
  }
  .big-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 80px;
    line-height: 1;
    color: var(--text);
    text-shadow: 0 0 40px rgba(0,212,255,0.2);
    transition: color 0.3s;
  }
  .big-time.warning { color: var(--yellow); }
  .big-time.danger { color: var(--red); animation: pulse 0.5s infinite; }
  .big-time.success { color: var(--green); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .clock-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* METRONOME DISPLAY */
  .metro-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .metro-bpm {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent);
  }
  .metro-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .beat-dots {
    display: flex;
    gap: 8px;
  }
  .beat-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.05s;
  }
  .beat-dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  /* INTERVAL TRACKER */
  .interval-track {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 16px 0;
  }
  .interval-box {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--muted);
    min-width: 70px;
    text-align: center;
    transition: all 0.3s;
  }
  .interval-box.current { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.05); }
  .interval-box.done-pass { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.05); }
  .interval-box.done-fail { border-color: var(--red); color: var(--red); background: rgba(255,51,85,0.05); }
  .interval-box.rest { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,0,0.05); }

  /* REP COUNTER */
  .rep-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
  }
  .rep-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 1;
  }
  .rep-target {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--muted);
  }
  .rep-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    padding: 10px 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .rep-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rep-btn.minus:hover { border-color: var(--red); color: var(--red); }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    padding: 12px 28px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00b8d9; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #cc2244; }
  .btn-success { background: var(--green); color: #000; }
  .btn-success:hover { background: #00cc70; }
  .btn-warn { background: var(--accent2); color: #000; }
  .btn-warn:hover { background: #e05a28; }

  /* PASS/FAIL */
  .pass-fail {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
  }
  .pf-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    padding: 10px 24px;
    border: 2px solid;
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
    transition: all 0.2s;
  }
  .pf-btn.pass-btn { border-color: var(--green); color: var(--green); }
  .pf-btn.pass-btn:hover, .pf-btn.pass-btn.selected { background: var(--green); color: #000; }
  .pf-btn.fail-btn { border-color: var(--red); color: var(--red); }
  .pf-btn.fail-btn:hover, .pf-btn.fail-btn.selected { background: var(--red); color: #fff; }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    gap: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .status-item { text-align: center; }
  .status-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--accent);
  }
  .status-key {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CRITERIA */
  .criteria {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 16px 0;
  }
  .criteria-box {
    padding: 12px;
    border-radius: 4px;
    border: 1px solid;
  }
  .criteria-pass { border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.03); }
  .criteria-fail { border-color: rgba(255,51,85,0.3); background: rgba(255,51,85,0.03); }
  .criteria-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .criteria-pass .criteria-title { color: var(--green); }
  .criteria-fail .criteria-title { color: var(--red); }
  .criteria-item {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    padding-left: 12px;
    position: relative;
  }
  .criteria-item::before { content: '—'; position: absolute; left: 0; }

  /* PHASE indicator */
  .phase-indicator {
    text-align: center;
    padding: 10px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 4px;
    margin: 10px 0;
  }
  .phase-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--yellow);
  }

  /* RESULT OVERLAY */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: var(--surface);
    border: 2px solid;
    border-radius: 8px;
    padding: 40px 60px;
    text-align: center;
    max-width: 400px;
  }
  .result-box.pass { border-color: var(--green); }
  .result-box.fail { border-color: var(--red); }
  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
  }
  .result-box.pass .result-title { color: var(--green); }
  .result-box.fail .result-title { color: var(--red); }
  .result-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    margin: 12px 0;
  }
  .result-event {
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .big-time { font-size: 60px; }
    .criteria { grid-template-columns: 1fr; }
    .panel-num { font-size: 32px; }
    .panel-title { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- AUDIO UNLOCK BANNER -->
<div id="audioBanner" style="background:#ff6b35;color:#000;text-align:center;padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:16px;" onclick="unlockAudio();requestWakeLock();">
  <span>▶ TAP HERE TO ENABLE AUDIO + KEEP SCREEN ON</span>
</div>

<div class="header">
  <div>
    <div class="header-title">USCG RESCUE SWIMMER PTA</div>
    <div class="header-sub">PHYSICAL TRAINING ASSESSMENT</div>
  </div>
  <div id="poolControl" style="visibility:hidden">
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;text-align:right;">POOL</div>
    <div class="pool-toggle">
      <button class="pool-btn active" id="yardBtn" onclick="setPool('yard')">YARD</button>
      <button class="pool-btn" id="meterBtn" onclick="setPool('meter')">METER</button>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-land" onclick="setTab('land')">LAND PTA</div>
  <div class="tab" id="tab-water" onclick="setTab('water')">WATER PTA</div>
  <div class="tab" id="tab-practice" onclick="setTab('practice')">WATER PTA TRAINING</div>
</div>

<div class="container">

  <!-- STATUS BAR -->
  <div class="status-bar" id="statusBar">
    <div class="status-item">
      <div class="status-val" id="statusPassed">0</div>
      <div class="status-key">PASSED</div>
    </div>
    <div class="status-item">
      <div class="status-val" style="color:var(--red)" id="statusFailed">0</div>
      <div class="status-key">FAILED</div>
    </div>
    <div class="status-item">
      <div class="status-val" style="color:var(--muted)" id="statusRemain">6</div>
      <div class="status-key">REMAINING</div>
    </div>
    <div class="status-item" style="margin-left:auto;">
      <div class="status-val" id="statusElapsed">00:00</div>
      <div class="status-key">TOTAL TIME</div>
    </div>
  </div>

  <!-- ACTIVE PANEL -->
  <div id="activePanel" class="hidden"></div>

  <!-- EVENT LIST -->
  <div id="eventList" class="event-list" style="display:flex;flex-direction:column;gap:8px;"></div>

</div>

<!-- PERSISTENT FOOTER -->
<div id="ptaFooter" style="
  position:fixed; bottom:0; left:0; right:0; z-index:120;
  background:var(--surface); border-top:2px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; justify-content:space-between;
  gap:12px;
">
  <div style="text-align:left;">
    <div style="font-family:'Share Tech Mono',monospace;font-size:24px;color:var(--text);" id="footerElapsed">00:00</div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;">TOTAL TIME</div>
  </div>
  <button class="btn btn-success" onclick="ptaComplete()" style="font-size:18px;padding:12px 28px;letter-spacing:2px;">
    ✓ PTA COMPLETE
  </button>
</div>

<!-- PTA COMPLETE OVERLAY -->
<div id="ptaCompleteOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:250;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:2px solid var(--green);border-radius:8px;padding:40px 50px;text-align:center;max-width:420px;width:90%;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:var(--green);">HOORAH!</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:36px;margin:12px 0;" id="ptaFinalTime">00:00</div>
    <div style="font-size:13px;color:var(--muted);letter-spacing:2px;margin-bottom:28px;">TOTAL ASSESSMENT TIME</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-secondary" onclick="closePtaComplete()">CLOSE</button>
      <button class="btn btn-danger" onclick="resetAll()">RESET ALL</button>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box" id="resultBox">
    <div class="result-title" id="resultTitle">PASS</div>
    <div class="result-time" id="resultTime"></div>
    <div class="result-event" id="resultEvent"></div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="closeResult()">CONTINUE</button>
    </div>
  </div>
</div>

<script>
// ─── AUDIO CONTEXT ───────────────────────────────────────────────────
let audioCtx = null;
let audioUnlocked = false;

function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(()=>{});
  }
  return audioCtx;
}

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    const ctx = getAudio();
    ctx.resume().then(() => {
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(ctx.destination);
      src.start(0);
      audioUnlocked = true;
      const banner = document.getElementById('audioBanner');
      if (banner) banner.style.display = 'none';
      requestWakeLock();
    }).catch(()=>{});
  } catch(e) {}
}

// Unlock on any touch/click anywhere
document.addEventListener('click', unlockAudio, { once: false });
document.addEventListener('touchstart', unlockAudio, { once: false });

// ─── WAKE LOCK (keep screen on) ───────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

// Re-acquire wake lock if released (e.g. tab switch)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await requestWakeLock();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  }
});

// Request on first user interaction
document.addEventListener('click', requestWakeLock, { once: true });
document.addEventListener('touchstart', requestWakeLock, { once: true });

function beep(freq=880, dur=0.06, vol=0.6, type='square') {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
    // iOS: force resume AFTER scheduling nodes
    if (ctx.state === 'suspended') ctx.resume().catch(()=>{});
  } catch(e) {}
}
function beepHigh() { beep(1320, 0.05, 0.5); }
function beepLow()  { beep(660, 0.08, 0.7, 'sine'); }
function beepStart(){ beep(440, 0.12, 0.8); setTimeout(()=>beep(880,0.12,0.8),150); }
function beepEnd()  { beep(1760, 0.1, 0.7); setTimeout(()=>beep(1320,0.1,0.7),100); setTimeout(()=>beep(2200,0.15,0.8),200); }
function beepFail() { beep(220, 0.2, 0.8, 'sawtooth'); }
function beepRest() { beep(550, 0.15, 0.6, 'sine'); }

function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1; u.pitch = 1.0; u.volume = 1.0;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// Distinct tones for each count — timing driven by setTimeout not speech
function beepCount(step) {
  if      (step === 3)     beep(440,  0.12, 0.7, 'sine');
  else if (step === 2)     beep(550,  0.12, 0.7, 'sine');
  else if (step === 1)     beep(660,  0.12, 0.7, 'sine');
  else if (step === 'go')  { beep(1320, 0.08, 0.7); setTimeout(()=>beep(1760,0.12,0.8),80); }
  else if (step === 'rest'){ beep(440,  0.15, 0.7, 'sine'); setTimeout(()=>beep(330,0.2,0.6,'sine'),120); }
}

function countdownGo(onComplete) {
  beepCount(3); speak('3');
  setTimeout(() => { beepCount(2); speak('2'); }, 900);
  setTimeout(() => { beepCount(1); speak('1'); }, 1800);
  setTimeout(() => { beepCount('go'); speak('Go'); if (onComplete) onComplete(); }, 2700);
}

function countdownRest(onComplete) {
  beepCount(3); speak('3');
  setTimeout(() => { beepCount(2); speak('2'); }, 900);
  setTimeout(() => { beepCount(1); speak('1'); }, 1800);
  setTimeout(() => { beepCount('rest'); speak('Rest'); if (onComplete) onComplete(); }, 2700);
}

// ─── HELPERS ─────────────────────────────────────────────────────────
function fmtTime(s) {
  const m = Math.floor(Math.abs(s)/60);
  const sec = Math.abs(s)%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function getTargetSeconds(ev) {
  if (ev.targetSecondsYard) return pool==='yard' ? ev.targetSecondsYard : ev.targetSecondsMeter;
  return ev.targetSeconds;
}
function getRestSeconds(ev) {
  if (ev.restSecondsYard !== undefined) return pool==='yard' ? ev.restSecondsYard : ev.restSecondsMeter;
  return ev.restSeconds || 0;
}
function getSpec(ev) {
  if (typeof ev.spec === 'object') return ev.spec[pool];
  return ev.spec;
}
function getPass(ev) {
  if (Array.isArray(ev.passCriteria)) return ev.passCriteria;
  return ev.passCriteria[pool];
}

// ─── TOTAL TIMER ──────────────────────────────────────────────────────
function startTotalTimer() {
  if (totalInterval) return;
  totalInterval = setInterval(() => {
    totalSeconds++;
    const t = fmtTime(totalSeconds);
    const se = document.getElementById('statusElapsed');
    const fe = document.getElementById('footerElapsed');
    if (se) se.textContent = t;
    if (fe) fe.textContent = t;
  }, 1000);
}

// ─── RENDER ───────────────────────────────────────────────────────────
function renderEventList() {
  if (currentTab === 'practice') return;
  const events = EVENTS[currentTab];
  if (!events) return;
  const list = document.getElementById('eventList');
  if (!list) return;
  list.innerHTML = '';
  events.forEach(ev => {
    const r = results[ev.id];
    let borderClass = activeEventId===ev.id ? 'active' : '';
    if (r==='pass') borderClass += ' passed';
    if (r==='fail') borderClass += ' failed';

    const badgeClass = ev.badge==='METRO' ? 'badge-metronome' : ev.badge==='INTERVAL' ? 'badge-interval' : 'badge-timer';
    let resultBadge = '';
    if (r==='pass') resultBadge = '<span class="event-badge badge-pass">PASS</span>';
    if (r==='fail') resultBadge = '<span class="event-badge badge-fail">FAIL</span>';

    list.innerHTML += `
      <div class="event-card ${borderClass}" onclick="selectEvent('${ev.id}')">
        <div class="event-num">0${ev.num}</div>
        <div class="event-info">
          <div class="event-name">${ev.name}</div>
          <div class="event-spec">${getSpec(ev)}</div>
        </div>
        <span class="event-badge ${badgeClass}">${ev.badge}</span>
        ${resultBadge}
      </div>`;
  });
  updateStatus();
}

function updateStatus() {
  const events = EVENTS[currentTab];
  if (!events) return;
  let passed=0, failed=0;
  events.forEach(ev => {
    if (results[ev.id]==='pass') passed++;
    if (results[ev.id]==='fail') failed++;
  });
  document.getElementById('statusPassed').textContent = passed;
  document.getElementById('statusFailed').textContent = failed;
  document.getElementById('statusRemain').textContent = EVENTS[currentTab].length - passed - failed;
}

// ─── METRONOME ────────────────────────────────────────────────────────
let metroPaused = false;

function toggleMetronome() {
  if (!timerRunning || metroPaused) {
    startMetronome();
  } else {
    pauseMetronome();
  }
}

function pauseMetronome() {
  if (metroInterval) { clearInterval(metroInterval); metroInterval = null; }
  metroPaused = true;
  timerRunning = false;
  const btn = document.getElementById('startBtn');
  if (btn) { btn.textContent = 'RESUME'; btn.className = 'btn btn-primary'; }
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
}

function startMetronome() {
  const ev = getCurrentEvent();
  if (!metroPaused) {
    // Fresh start
    stopAll();
    beatCount = 0;
    currentBeat = 0;
    repCount = 0;
    updateRepDisplay();
  }
  metroPaused = false;
  timerRunning = true;
  startTotalTimer();
  if (!metroPaused) beepStart();

  const btn = document.getElementById('startBtn');
  if (btn) { btn.textContent = 'STOP'; btn.className = 'btn btn-danger'; btn.onclick = pauseMetronome; }

  const msPerBeat = 60000 / ev.bpm;
  function tick() {
    const dotEl = document.getElementById(`dot${currentBeat}`);
    if (dotEl) {
      document.querySelectorAll('.beat-dot').forEach(d=>d.classList.remove('active'));
      dotEl.classList.add('active');
    }
    const lbl = ev.beatInRep[currentBeat];
    const lblEl = document.getElementById('beatLabel');
    if (lblEl) lblEl.textContent = lbl;

    if (currentBeat === ev.beatsPerRep - 1 && ev.beatsPerRep === 5) beepLow();
    else if (currentBeat === 0) beepHigh();
    else beepLow();

    currentBeat = (currentBeat + 1) % ev.beatsPerRep;
  }

  tick();
  metroInterval = setInterval(tick, msPerBeat);
}

// ─── TIMED HOLD ───────────────────────────────────────────────────────
function startHold() {
  const ev = getCurrentEvent();
  stopAll();
  timerSeconds = 0;
  timerRunning = true;
  startTotalTimer();
  beepStart();
  document.getElementById('startBtn').textContent = 'STOP';
  document.getElementById('startBtn').className = 'btn btn-danger';
  document.getElementById('startBtn').onclick = () => { stopAll(); renderPanel(ev); };

  timerInterval = setInterval(() => {
    timerSeconds++;
    const el = document.getElementById('bigTime');
    if (!el) return;
    el.textContent = fmtTime(timerSeconds);
    const remaining = ev.targetSeconds - timerSeconds;
    if (remaining <= 10 && remaining > 0) { el.className = 'big-time warning'; if (remaining<=5) beepHigh(); }
    else if (remaining <= 0) {
      el.className = 'big-time success';
      beepEnd();
      stopTimerInterval();
      showResult('pass', fmtTime(timerSeconds), ev.name);
    } else { el.className = 'big-time'; }
  }, 1000);
}

// ─── SWIM TIMER ───────────────────────────────────────────────────────
function startSwim() {
  const ev = getCurrentEvent();
  const tgt = getTargetSeconds(ev);
  stopAll();
  timerSeconds = 0;
  timerRunning = true;
  startTotalTimer();
  beepStart();
  document.getElementById('startBtn').textContent = 'STOP';
  document.getElementById('startBtn').className = 'btn btn-danger';
  document.getElementById('startBtn').onclick = () => { stopAll(); renderPanel(ev); };

  timerInterval = setInterval(() => {
    timerSeconds++;
    const el = document.getElementById('bigTime');
    if (!el) return;
    el.textContent = fmtTime(timerSeconds);
    const remaining = tgt - timerSeconds;
    if (remaining <= 15 && remaining > 0) { el.className = 'big-time warning'; if (remaining<=5) beepHigh(); }
    else if (remaining <= 0) {
      el.className = 'big-time danger';
      beepFail();
    } else { el.className = 'big-time'; }
  }, 1000);
}

// ─── SHUTTLE ─────────────────────────────────────────────────────────
let shuttleRound = 0;
function startShuttle() {
  const ev = getCurrentEvent();
  stopAll();
  shuttleRound = 0;
  timerSeconds = 0;
  timerRunning = true;
  startTotalTimer();
  beepStart();
  document.getElementById('startBtn').textContent = 'RUNNING...';
  document.getElementById('startBtn').className = 'btn btn-danger';
  document.getElementById('startBtn').onclick = null;
  document.getElementById(`ibox0`).className = 'interval-box current';
  document.getElementById('clockLabel').textContent = 'RUN 1 — MAX 79 SEC';

  runShuttleRound();
}

function runShuttleRound() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const el = document.getElementById('bigTime');
    if (!el) return;
    el.textContent = fmtTime(timerSeconds);
    const remaining = 79 - timerSeconds;
    if (remaining <= 10 && remaining > 0) { el.className = 'big-time warning'; if(remaining<=5) beepHigh(); }
    else if (timerSeconds > 79) { el.className = 'big-time danger'; }
    else { el.className = 'big-time'; }
  }, 1000);
}

function endShuttleRun() {
  stopTimerInterval();
  const ev = getCurrentEvent();
  const passed = timerSeconds <= 79;
  const box = document.getElementById(`ibox${shuttleRound}`);
  if (box) {
    box.className = `interval-box ${passed?'done-pass':'done-fail'}`;
    box.innerHTML = `RUN ${shuttleRound+1}<br>${fmtTime(timerSeconds)}`;
  }

  if (!passed) {
    beepFail();
  } else {
    beepEnd();
  }

  if (shuttleRound === 0) {
    // Start rest
    startShuttleRest(passed);
  } else {
    const allPass = passed && document.getElementById('ibox0').classList.contains('done-pass');
    showResult(allPass?'pass':'fail', `RUN 1 + RUN 2`, ev.name);
  }
}

function startShuttleRest(run1pass) {
  restSeconds = 300;
  restActive = true;
  const el = document.getElementById('bigTime');
  const lbl = document.getElementById('clockLabel');
  const btn = document.getElementById('startBtn');
  if (lbl) lbl.textContent = 'REST — 5 MINUTES';
  if (el) { el.className = 'big-time warning'; }
  beepRest();

  const box1 = document.getElementById('ibox1');
  if (box1) box1.className = 'interval-box rest';

  if (btn) {
    btn.textContent = 'END REST EARLY';
    btn.className = 'btn btn-warn';
    btn.onclick = () => beginRun2();
  }

  timerInterval = setInterval(() => {
    restSeconds--;
    if (el) el.textContent = fmtTime(restSeconds);
    if (restSeconds <= 10 && restSeconds > 0) beepHigh();
    if (restSeconds <= 0) {
      stopTimerInterval();
      beginRun2();
    }
  }, 1000);
}

function beginRun2() {
  stopTimerInterval();
  shuttleRound = 1;
  timerSeconds = 0;
  restActive = false;
  const lbl = document.getElementById('clockLabel');
  if (lbl) lbl.textContent = 'RUN 2 — MAX 79 SEC';
  const box = document.getElementById('ibox1');
  if (box) box.className = 'interval-box current';
  const btn = document.getElementById('startBtn');
  if (btn) {
    btn.textContent = 'STOP RUN 2';
    btn.className = 'btn btn-danger';
    btn.onclick = endShuttleRun;
  }
  beepStart();
  runShuttleRound();
}

// ─── SWIM INTERVAL ────────────────────────────────────────────────────
let lapResults = {};

function toggleLapResult(lapIndex) {
  const box = document.getElementById(`ibox${lapIndex}`);
  if (!box) return;
  const cur = lapResults[lapIndex] || 'none';
  const tapTime = fmtTime(timerSeconds);
  if (cur === 'none' || cur === undefined) {
    lapResults[lapIndex] = 'pass';
    box.className = 'interval-box done-pass';
    box.innerHTML = `LAP ${lapIndex+1}<br>${tapTime}<br><span style="font-size:10px;letter-spacing:1px;">✓ PASS</span>`;
    beepEnd();
  } else if (cur === 'pass') {
    lapResults[lapIndex] = 'fail';
    box.className = 'interval-box done-fail';
    box.innerHTML = `LAP ${lapIndex+1}<br>${tapTime}<br><span style="font-size:10px;letter-spacing:1px;">✗ FAIL</span>`;
    beepFail();
  } else {
    lapResults[lapIndex] = 'none';
    box.className = 'interval-box';
    box.innerHTML = `LAP ${lapIndex+1}<br>—`;
  }
}

let swimRound = 0;
let swimFailed = false;
function startSwimInterval() {
  const ev = getCurrentEvent();
  stopAll();
  swimRound = 0;
  swimFailed = false;
  lapResults = {};
  timerSeconds = 0;
  startTotalTimer();

  const btn = document.getElementById('startBtn');
  if (btn) { btn.textContent = 'RUNNING...'; btn.className = 'btn btn-secondary'; btn.onclick = null; }

  countdownGo(() => startLapClock(ev));
}

function startLapClock(ev) {
  const tgt = getTargetSeconds(ev);
  timerSeconds = 0;
  timerRunning = true;

  const box = document.getElementById(`ibox${swimRound}`);
  if (box) box.className = 'interval-box current';
  const lbl = document.getElementById('clockLabel');
  if (lbl) lbl.textContent = `LAP ${swimRound+1} / ${ev.intervals} — MAX ${fmtTime(tgt)}`;
  const el = document.getElementById('bigTime');
  if (el) { el.textContent = '00:00'; el.className = 'big-time'; }

  let restTriggered = false;
  let restCountdownFired = false;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const el = document.getElementById('bigTime');
    if (!el) return;
    el.textContent = fmtTime(timerSeconds);

    const remaining = tgt - timerSeconds;

    // Fire 3-2-1-REST so "Rest" lands exactly on tgt (2.7s countdown, fire at tgt-3 + 300ms offset)
    if (timerSeconds === tgt - 3 && !restCountdownFired) {
      restCountdownFired = true;
      setTimeout(() => countdownRest(null), 300);
    }

    // Warning color in last 10
    if (remaining <= 10 && remaining > 0) {
      el.className = 'big-time warning';
    } else {
      el.className = 'big-time';
    }

    // At target time: auto-end lap, begin rest
    if (timerSeconds >= tgt && !restTriggered) {
      restTriggered = true;
      el.className = 'big-time success';
      stopTimerInterval();

      const box = document.getElementById(`ibox${swimRound}`);
      if (box) {
        if (!lapResults[swimRound] || lapResults[swimRound] === 'none') {
          box.className = 'interval-box done-pass';
          box.innerHTML = `LAP ${swimRound+1}<br>${fmtTime(timerSeconds)}<br><span style="font-size:10px;letter-spacing:1px;">✓ PASS</span>`;
          lapResults[swimRound] = 'pass';
        } else {
          // Already manually marked — just update time
          const parts = box.innerHTML.split('<br>');
          box.innerHTML = `LAP ${swimRound+1}<br>${fmtTime(timerSeconds)}<br>${parts[2]||''}`;
        }
      }

      const nextRound = swimRound + 1;
      if (nextRound >= ev.intervals) {
        beepEnd();
        showResult(swimFailed?'fail':'pass', `${ev.intervals}x COMPLETE`, ev.name);
        return;
      }

      // Rest starts immediately at 37 (countdown already spoken)
      beginSwimRest(ev, nextRound);
    }
  }, 1000);
}

function beginSwimRest(ev, nextRound) {
  const bonus = getRestSeconds(ev); // 15 yard / 17 meter
  let restSecs = bonus;

  restActive = true;
  const lbl = document.getElementById('clockLabel');
  if (lbl) lbl.textContent = `REST — ${restSecs}S`;
  const el = document.getElementById('bigTime');
  if (el) { el.className = 'big-time warning'; el.textContent = fmtTime(restSecs); }

  const nextBox = document.getElementById(`ibox${nextRound}`);
  if (nextBox) nextBox.className = 'interval-box rest';

  let goFired = false;
  timerInterval = setInterval(() => {
    restSecs--;
    if (el) el.textContent = fmtTime(restSecs);
    // Fire 3-2-1-GO at 3s remaining + 300ms offset so GO lands exactly on 0
    if (restSecs === 3 && !goFired) {
      goFired = true;
      setTimeout(() => countdownGo(null), 300);
    }
    if (restSecs <= 0) {
      stopTimerInterval();
      swimRound = nextRound;
      startLapClock(ev);
    }
  }, 1000);
}

// ─── PHASES (KB) ─────────────────────────────────────────────────────
function startPhases() {
  const ev = getCurrentEvent();
  phase = 0;
  repCount = 0;
  updatePhaseUI(ev);
  beepStart();
  startTotalTimer();
  updatePhaseBtn(ev);
}

function updatePhaseBtn(ev) {
  const btn = document.getElementById('startBtn');
  if (!btn) return;
  const isLast = phase === ev.phases.length - 1;
  const isFirst = phase === 0;
  if (isLast) {
    btn.textContent = 'FINISH EVOLUTION';
    btn.className = 'btn btn-success';
  } else if (isFirst) {
    btn.textContent = 'NEXT PHASE →';
    btn.className = 'btn btn-warn';
  } else {
    btn.textContent = 'NEXT PHASE →';
    btn.className = 'btn btn-warn';
  }
  btn.onclick = nextPhase;
}

function updatePhaseUI(ev) {
  const p = ev.phases[phase];
  const nameEl = document.getElementById('phaseName');
  const instrEl = document.getElementById('phaseInstruction');
  const repArea = document.getElementById('phaseRepArea');
  const timerArea = document.getElementById('phaseTimerArea');
  if (nameEl) nameEl.textContent = p.name;
  if (instrEl) instrEl.textContent = p.instruction;

  // Color phase indicator by position
  const phaseBox = document.getElementById('phaseIndicator');
  if (phaseBox) {
    if (phase === 0) phaseBox.style.borderColor = 'rgba(0,212,255,0.4)';
    else if (phase === ev.phases.length - 1) phaseBox.style.borderColor = 'rgba(0,255,136,0.4)';
    else phaseBox.style.borderColor = 'rgba(255,215,0,0.4)';
  }

  if (p.type === 'reps') {
    if (repArea) repArea.classList.remove('hidden');
    if (timerArea) timerArea.classList.add('hidden');
    repCount = 0;
    updateRepDisplay();
  } else {
    if (repArea) repArea.classList.add('hidden');
    if (timerArea) timerArea.classList.remove('hidden');
    timerSeconds = 0;
    const el = document.getElementById('bigTime');
    if (el) el.textContent = '00:00';
    timerInterval = setInterval(() => {
      timerSeconds++;
      const el = document.getElementById('bigTime');
      if (el) el.textContent = fmtTime(timerSeconds);
    }, 1000);
  }
}

function nextPhase() {
  const ev = getCurrentEvent();
  stopTimerInterval();
  phase++;
  if (phase >= ev.phases.length) {
    beepEnd();
    showResult('pass', 'COMPLETE', ev.name);
    return;
  }
  beepStart();
  updatePhaseUI(ev);
  updatePhaseBtn(ev);
}

// ─── REP COUNTING ─────────────────────────────────────────────────────
function adjRep(delta) {
  const ev = getCurrentEvent();
  repCount = Math.max(0, repCount + delta);
  updateRepDisplay();
  if (ev && ev.totalReps && repCount >= ev.totalReps) {
    beepEnd();
  }
}
function updateRepDisplay() {
  const el = document.getElementById('repCount');
  if (el) {
    el.textContent = repCount;
    const ev = getCurrentEvent();
    if (ev && ev.totalReps) {
      if (repCount >= ev.totalReps) el.style.color = 'var(--green)';
      else el.style.color = 'var(--text)';
    }
  }
}

// ─── RESULT ───────────────────────────────────────────────────────────
function showResult(outcome, time, eventName) {
  const overlay = document.getElementById('resultOverlay');
  const box = document.getElementById('resultBox');
  const title = document.getElementById('resultTitle');
  const timeEl = document.getElementById('resultTime');
  const evEl = document.getElementById('resultEvent');
  box.className = `result-box ${outcome}`;
  title.textContent = outcome.toUpperCase();
  timeEl.textContent = time;
  evEl.textContent = eventName.toUpperCase();
  overlay.classList.add('show');
  // Auto-record result so event list and status bar update
  const ev = getCurrentEvent();
  if (ev && !results[ev.id]) {
    results[ev.id] = outcome;
    renderEventList();
    // Trigger rest banners
    const waterIds = ['sw400','sp6x50','bt4x50'];
    if (currentTab === 'water' && waterIds.includes(ev.id)) {
      startInterEventRest(300, '5-MIN REST');
    }
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
}

function markResult(outcome) {
  const ev = getCurrentEvent();
  results[ev.id] = outcome;
  if (outcome==='pass') beepEnd(); else beepFail();
  renderEventList();
  renderPanel(ev);

  // 2-min rest after land events 1-5
  const landIds = ['bwr','pu','sp','pu2','kb'];
  if (currentTab === 'land' && landIds.includes(ev.id)) {
    startInterEventRest(120, '2-MIN REST');
  }

  // 5-min rest between water events
  const waterIds = ['sw400','sp6x50','bt4x50'];
  if (currentTab === 'water' && waterIds.includes(ev.id)) {
    startInterEventRest(300, '5-MIN REST');
  }
}

let restBannerInterval = null;
function startInterEventRest(duration, label) {
  const old = document.getElementById('restBanner');
  if (old) old.remove();
  if (restBannerInterval) { clearInterval(restBannerInterval); restBannerInterval = null; }

  let secs = duration;
  const banner = document.createElement('div');
  banner.id = 'restBanner';
  banner.style.cssText = `
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:#181c22; border-top:3px solid var(--yellow);
    padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
    font-family:'Bebas Neue',sans-serif;
  `;
  banner.innerHTML = `
    <div style="color:var(--yellow);font-size:22px;letter-spacing:3px;">${label}</div>
    <div id="restBannerTime" style="font-family:'Share Tech Mono',monospace;font-size:36px;color:var(--text);">${fmtTime(secs)}</div>
    <button onclick="skipInterEventRest()" style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;padding:8px 18px;border:1px solid var(--muted);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;">SKIP</button>
  `;
  document.body.appendChild(banner);
  beepRest();

  restBannerInterval = setInterval(() => {
    secs--;
    const el = document.getElementById('restBannerTime');
    if (el) el.textContent = fmtTime(secs);
    if (secs <= 10 && secs > 0) beepHigh();
    if (secs <= 0) skipInterEventRest();
  }, 1000);
}

function skipInterEventRest() {
  if (restBannerInterval) { clearInterval(restBannerInterval); restBannerInterval = null; }
  const banner = document.getElementById('restBanner');
  if (banner) banner.remove();
  beepStart();
}

// ─── STOP HELPERS ─────────────────────────────────────────────────────
function stopTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function stopAll() {

function setTab(tab) {

// ─── PRACTICE MODE ───────────────────────────────────────────────────
let practiceInterval = null;
let practiceRunning = false;
let practicePaused = false;
let practiceStep = 0;
let practiceSeconds = 0;
let practiceResumeCallback = null;

function togglePracticePause() {
  const btn = document.getElementById('practicePauseBtn');
  if (!practicePaused) {
    // PAUSE
    practicePaused = true;
    if (practiceInterval) { clearInterval(practiceInterval); practiceInterval = null; }
    window.speechSynthesis && window.speechSynthesis.cancel();
    if (btn) { btn.textContent = 'RESUME'; btn.className = 'btn btn-success'; }
    const sub = document.getElementById('practiceSubLabel');
    if (sub) sub.textContent = '— PAUSED —';
  } else {
    // RESUME
    practicePaused = false;
    if (btn) { btn.textContent = 'PAUSE'; btn.className = 'btn btn-warn'; }
    if (practiceResumeCallback) practiceResumeCallback();
  }
}

function getPracticeSequence() {
  const isYard = pool === 'yard';
  return [
    { label: '400 YD/M SWIM', type: 'swim', duration: isYard ? 390 : 430, unit: isYard ? '6:30' : '7:10' },
    { label: '5-MIN REST', type: 'rest', duration: 300 },
    { label: '6x50 SPRINTS', type: 'interval', intervals: 6, lapDur: isYard ? 37 : 41, restDur: isYard ? 15 : 17 },
    { label: '5-MIN REST', type: 'rest', duration: 300 },
    { label: '4x50 BUDDY TOW', type: 'interval', intervals: 4, lapDur: isYard ? 75 : 84, restDur: isYard ? 20 : 22 },
    { label: '5-MIN REST', type: 'rest', duration: 300 },
    { label: '4x50 UW/SWIM', type: 'interval', intervals: 4, lapDur: isYard ? 75 : 84, restDur: 0 },
  ];
}

function renderPracticePanel() {
  const seq = getPracticeSequence();
  const panel = document.getElementById('activePanel');
  panel.classList.remove('hidden');
  let stepList = seq.map((s, i) => `
    <div class="event-card" id="pstep${i}" style="opacity:0.35;border-left-color:var(--border)">
      <div class="event-num" style="font-size:16px">${String(i+1).padStart(2,'0')}</div>
      <div class="event-info">
        <div class="event-name" style="font-size:14px">${s.label}</div>
        <div class="event-spec">${s.type==='interval'?`${s.intervals} LAPS — ${fmtTime(s.lapDur)} + ${s.restDur}S REST`:s.type==='rest'?fmtTime(s.duration):s.unit}</div>
      </div>
    </div>`).join('');

  panel.innerHTML = `
    <div class="event-panel">
      <div class="panel-header">
        <div><div class="panel-title" style="font-size:28px;">WATER PTA TRAINING</div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:2px;">FULLY AUTOMATED — ${pool.toUpperCase()} POOL</div></div>
      </div>
      <div style="text-align:center;padding:20px 0;">
        <div id="practiceEventLabel" style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--muted);">READY TO START</div>
        <div id="practiceLapLabel" style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:2px;">—</div>
        <div class="big-time" id="practiceTime" style="margin:16px 0;">00:00</div>
        <div id="practiceSubLabel" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;">HIT START TO BEGIN FULL SEQUENCE</div>
      </div>
      <div class="controls" style="margin-bottom:20px;">
        <button class="btn btn-primary" id="practiceStartBtn" onclick="startPractice()">START PRACTICE</button>
        <button class="btn btn-warn" id="practicePauseBtn" onclick="togglePracticePause()" style="display:none">PAUSE</button>
        <button class="btn btn-secondary" onclick="stopPractice();renderPracticePanel()">RESET</button>
      </div>
      <div class="event-list" style="gap:6px;">${stepList}</div>
    </div>`;
}

function startPractice() {
  stopPractice();
  practiceStep = 0;
  practiceRunning = true;
  startTotalTimer();
  const btn = document.getElementById('practiceStartBtn');
  if (btn) { btn.textContent = 'RUNNING...'; btn.className = 'btn btn-secondary'; btn.onclick = null; }
  const pauseBtn = document.getElementById('practicePauseBtn');
  if (pauseBtn) pauseBtn.style.display = 'inline-block';
  runPracticeStep();
}

function stopPractice() {
  if (practiceInterval) { clearInterval(practiceInterval); practiceInterval = null; }
  practiceRunning = false;
  practicePaused = false;
  practiceResumeCallback = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
}

function runPracticeStep() {
  const seq = getPracticeSequence();
  if (practiceStep >= seq.length) { practiceComplete(); return; }
  const step = seq[practiceStep];
  seq.forEach((_, i) => {
    const el = document.getElementById(`pstep${i}`);
    if (!el) return;
    if (i < practiceStep) { el.style.opacity='1'; el.style.borderLeftColor='var(--green)'; }
    else if (i === practiceStep) { el.style.opacity='1'; el.style.borderLeftColor='var(--accent)'; }
    else { el.style.opacity='0.3'; el.style.borderLeftColor='var(--border)'; }
  });
  if (step.type === 'swim') runPracticeSwim(step);
  else if (step.type === 'rest') runPracticeRest(step);
  else if (step.type === 'interval') runPracticeInterval(step, 0);
}

function setPracticeLabel(event, lap, sub) {
  const el = document.getElementById('practiceEventLabel');
  const ll = document.getElementById('practiceLapLabel');
  const sl = document.getElementById('practiceSubLabel');
  if (el) el.textContent = event;
  if (ll) ll.textContent = lap;
  if (sl) sl.textContent = sub;
}

function setPracticeTime(secs, cls) {
  const el = document.getElementById('practiceTime');
  if (el) { el.textContent = fmtTime(secs); el.className = `big-time ${cls||''}`; }
}

function markPracticeStepDone() {
  const el = document.getElementById(`pstep${practiceStep}`);
  if (el) { el.style.opacity='1'; el.style.borderLeftColor='var(--green)'; }
}

function runPracticeSwim(step) {
  practiceSeconds = 0;
  setPracticeLabel(step.label, 'TIMER RUNNING', `MAX ${step.unit}`);
  countdownGo(() => {
    const tick = () => {
      practiceResumeCallback = tick;
      practiceInterval = setInterval(() => {
        if (practicePaused) return;
        practiceSeconds++;
        setPracticeTime(practiceSeconds, practiceSeconds >= step.duration - 10 ? 'warning' : '');
        if (practiceSeconds >= step.duration) {
          clearInterval(practiceInterval); practiceInterval = null;
          setPracticeTime(practiceSeconds, 'success');
          speak('Time');
          markPracticeStepDone();
          setTimeout(() => { practiceStep++; runPracticeStep(); }, 1500);
        }
      }, 1000);
    };
    tick();
  });
}

function runPracticeRest(step) {
  practiceSeconds = step.duration;
  setPracticeLabel(step.label, 'REST', fmtTime(practiceSeconds));
  setPracticeTime(practiceSeconds, 'warning');
  beepRest();
  let goFired = false;
  const restTick = () => {
    practiceResumeCallback = restTick;
    practiceInterval = setInterval(() => {
      if (practicePaused) return;
      practiceSeconds--;
      setPracticeTime(practiceSeconds, 'warning');
      setPracticeLabel(step.label, 'REST', fmtTime(practiceSeconds));
      if (practiceSeconds === 3 && !goFired) { goFired = true; setTimeout(() => countdownGo(null), 300); }
      if (practiceSeconds <= 0) {
        clearInterval(practiceInterval); practiceInterval = null;
        markPracticeStepDone();
        practiceStep++;
        runPracticeStep();
      }
    }, 1000);
  };
  restTick();
}

function runPracticeInterval(step, lapIndex) {
  if (lapIndex >= step.intervals) {
    markPracticeStepDone();
    practiceStep++;
    runPracticeStep();
    return;
  }
  practiceSeconds = 0;
  setPracticeLabel(step.label, `LAP ${lapIndex+1} / ${step.intervals}`, `MAX ${fmtTime(step.lapDur)}`);
  setPracticeTime(0, '');
  let restFired = false;
  countdownGo(() => {
    const lapTick = () => {
      practiceResumeCallback = lapTick;
      practiceInterval = setInterval(() => {
        if (practicePaused) return;
        practiceSeconds++;
        const remaining = step.lapDur - practiceSeconds;
        setPracticeTime(practiceSeconds, remaining <= 10 ? 'warning' : '');
        if (practiceSeconds === step.lapDur - 3 && !restFired) {
          restFired = true;
          setTimeout(() => countdownRest(null), 300);
        }
        if (practiceSeconds >= step.lapDur) {
          clearInterval(practiceInterval); practiceInterval = null;
          setPracticeTime(practiceSeconds, 'success');
          const nextLap = lapIndex + 1;
          if (nextLap >= step.intervals) {
            beepEnd();
            speak('Complete');
            markPracticeStepDone();
            setTimeout(() => { practiceStep++; runPracticeStep(); }, 1500);
          } else {
            runPracticeIntervalRest(step, nextLap);
          }
        }
      }, 1000);
    };
    lapTick();
  });
}

function runPracticeIntervalRest(step, nextLap) {
  let restSecs = step.restDur;
  setPracticeLabel(step.label, `REST — LAP ${nextLap+1} NEXT`, fmtTime(restSecs));
  setPracticeTime(restSecs, 'warning');
  if (restSecs <= 0) { runPracticeInterval(step, nextLap); return; }
  let goFired = false;
  const iRestTick = () => {
    practiceResumeCallback = iRestTick;
    practiceInterval = setInterval(() => {
      if (practicePaused) return;
      restSecs--;
      setPracticeTime(restSecs, 'warning');
      setPracticeLabel(step.label, `REST — LAP ${nextLap+1} NEXT`, fmtTime(restSecs));
      if (restSecs === 3 && !goFired) { goFired = true; setTimeout(() => countdownGo(null), 300); }
      if (restSecs <= 0) {
        clearInterval(practiceInterval); practiceInterval = null;
        runPracticeInterval(step, nextLap);
      }
    }, 1000);
  };
  iRestTick();
}

function practiceComplete() {
  stopPractice();
  setPracticeLabel('PRACTICE COMPLETE', '—', 'FULL WATER PTA SEQUENCE DONE');
  setPracticeTime(0, 'success');
  beepEnd();
  speak('Practice complete. Good work.');
  const seq = getPracticeSequence();
  seq.forEach((_, i) => {
    const el = document.getElementById(`pstep${i}`);
    if (el) { el.style.opacity='1'; el.style.borderLeftColor='var(--green)'; }
  });
}

// ─── PTA COMPLETE ─────────────────────────────────────────────────────
function ptaComplete() {
  stopAll();
  stopPractice();
  if (totalInterval) { clearInterval(totalInterval); totalInterval = null; }
  const t = fmtTime(totalSeconds);
  document.getElementById('ptaFinalTime').textContent = t;
  document.getElementById('ptaCompleteOverlay').style.display = 'flex';
  beepEnd();
  speak('PTA Complete.');
}

function closePtaComplete() {
  document.getElementById('ptaCompleteOverlay').style.display = 'none';
}

function resetAll() {
  closePtaComplete();
  stopAll();
  stopPractice();
  if (totalInterval) { clearInterval(totalInterval); totalInterval = null; }
  totalSeconds = 0;
  results = {};
  lapResults = {};
  activeEventId = null;
  const fe = document.getElementById('footerElapsed');
  const se = document.getElementById('statusElapsed');
  if (fe) fe.textContent = '00:00';
  if (se) se.textContent = '00:00';
  document.getElementById('activePanel').classList.add('hidden');
  document.getElementById('activePanel').innerHTML = '';
  const rb = document.getElementById('restBanner');
  if (rb) rb.remove();
  setTab(currentTab);
}

// ─── INIT ─────────────────────────────────────────────────────────────
renderEventList();
</script>
